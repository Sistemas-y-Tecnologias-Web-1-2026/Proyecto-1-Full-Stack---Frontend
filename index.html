<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Series Tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <h1>Series Tracker</h1>
      <nav class="top-nav">
        <a href="index.html" class="active">Lista</a>
        <a href="create.html">Crear serie</a>
      </nav>
    </header>

    <main class="layout">
      <section class="panel">
        <h2>Lista de Series</h2>
        <div class="row">
          <input id="searchInput" type="search" placeholder="Buscar por nombre" />
          <select id="sortSelect">
            <option value="id">ID</option>
            <option value="name">Nombre</option>
            <option value="current_episode">Episodio actual</option>
            <option value="total_episodes">Total episodios</option>
          </select>
          <select id="orderSelect">
            <option value="asc">Asc</option>
            <option value="desc">Desc</option>
          </select>
          <select id="limitSelect">
            <option value="5">5</option>
            <option value="10" selected>10</option>
            <option value="20">20</option>
          </select>
          <button id="applyFiltersBtn" type="button">Aplicar</button>
        </div>

        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Portada</th>
                <th>Nombre</th>
                <th>Episodios</th>
                <th>Rating</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="seriesTableBody"></tbody>
          </table>
        </div>

        <div class="pagination">
          <button id="prevPageBtn" type="button">Anterior</button>
          <span id="pageInfo">Pagina 1</span>
          <button id="nextPageBtn" type="button">Siguiente</button>
        </div>
      </section>
    </main>

    <template id="rowTemplate">
      <tr>
        <td class="cover"></td>
        <td class="name"></td>
        <td class="episodes"></td>
        <td class="rating"></td>
        <td class="actions"></td>
      </tr>
    </template>

    <script src="list.js"></script>
  </body>
</html>
